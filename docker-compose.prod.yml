# Docker Compose para Produção - VetQueue v2 (Otimizado para DigitalOcean)

services:
  # O serviço 'postgres' foi REMOVIDO. Usaremos o banco de dados gerenciado.

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vetqueue-backend
    restart: unless-stopped
    env_file:
      - .env  # <--- MUDANÇA: Carrega todas as variáveis do arquivo .env
    networks:
      - vetqueue-network
    ports:
      - "8000:8000"
    # <--- MUDANÇA: 'depends_on' para o postgres foi removido pois ele é externo.
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Passa as variáveis do .env para o build do frontend
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: vetqueue-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy # Mantém a dependência do backend, que é ótimo.
    networks:
      - vetqueue-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (para cache e sessões)
  redis:
    image: redis:7-alpine
    container_name: vetqueue-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # <--- MUDANÇA: Seção 'ports' removida para aumentar a segurança.
    # O backend vai acessar o Redis pela rede interna 'vetqueue-network'.
    networks:
      - vetqueue-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# Volumes persistentes
volumes:
  redis_data:
    driver: local
  # <--- MUDANÇA: Volume 'postgres_data' removido.

# Rede interna
networks:
  vetqueue-network:
    driver: bridge