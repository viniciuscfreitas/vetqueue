version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vetqueue-postgres
    environment:
      POSTGRES_DB: vetqueue_dev
      POSTGRES_USER: vetqueue
      POSTGRES_PASSWORD: vetqueue_dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetqueue -d vetqueue_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vetqueue-network

  # Service para banco de testes (porta diferente para evitar conflitos)
  postgres-test:
    image: postgres:16-alpine
    container_name: vetqueue-postgres-test
    environment:
      POSTGRES_DB: vetqueue_test
      POSTGRES_USER: vetqueue
      POSTGRES_PASSWORD: vetqueue_test_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetqueue -d vetqueue_test"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - vetqueue-network

volumes:
  postgres_data:
    driver: local

networks:
  vetqueue-network:
    driver: bridge

